services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: hospital_scheduler
      FLASK_PORT: "5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:5000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:5000
    depends_on:
      - backend

volumes:
  mongo-data:
